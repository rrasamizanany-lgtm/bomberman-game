services:
  - type: web
    name: bomberman-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        scope: build
        value: https://bomberman-frontend.onrender.com

  - type: web
    name: bomberman-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_SERVER_URL
        scope: build
        value: https://bomberman-backend.onrender.com
